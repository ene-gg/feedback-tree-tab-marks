name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Extension version
      placeholder: e.g. 1.2.0
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: What happened?
      description: What went wrong? What did you want to happen? How do I reproduce this?
    validations:
      required: true
